<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Security Headers -->
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://file.garden https://z-cdn-media.chatglm.cn; connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com; frame-ancestors 'none';">

<!-- SEO & Icon -->
<meta name="description" content="Mini Games Calm Relax - A cozy little corner of the internet.">
<meta name="keywords" content="mini games, relax, calm, sprunki, platform chicken, web games">
<link rel="icon" type="image/jpeg" href="https://file.garden/ab3aurfNg352xuEX/logo.jpg">
<title>[   ᴍɪɴɪ ɢᴀᴍᴇꜱ ᴄᴀʟᴍ ʀᴇʟᴀx  ]</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
/* --- THEME VARIABLES --- */
:root {
  --bg: #18111d;
  --bg2: #1f1824;
  --bg3: #2a232e;
  --text: #f8eef2;
  --muted: #a08a94;
  --amber: #e5bcbc;
  --amber2: #ffd6e4;
  --rose: #d69aa8;
  --teal: #7ccab8;
  --lilac: #c9a8e3;
  --border: rgba(229, 188, 188, 0.15);
  --border2: rgba(229, 188, 188, 0.35);
  --nav-bg: rgba(24, 17, 29, 0.95);
  --panel-bg: rgba(28, 20, 32, 0.98);
  --check-a: rgba(229, 188, 188, 0.04);
}

body.light {
  --bg: #fdfdfd;
  --bg2: #ffffff;
  --bg3: #f7f7f7;
  --text: #3d2c33;
  --muted: #8a7a7f;
  --amber: #d69aa8;
  --amber2: #ffb8c9;
  --rose: #d65d7a;
  --teal: #2a9d8f;
  --lilac: #8e66b3;
  --border: rgba(100, 80, 90, 0.12);
  --border2: rgba(100, 80, 90, 0.22);
  --nav-bg: rgba(253, 253, 253, 0.92);
  --panel-bg: rgba(255, 255, 255, 0.97);
  --check-a: rgba(0, 0, 0, 0.07);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;position:relative;min-height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;transition:background .4s,color .3s}

/* Icon Utils */
.icon { width: 1em; height: 1em; display: inline-block; vertical-align: middle; }
.icon-lg { width: 1.2em; height: 1.2em; }
.icon-xl { width: 1.5em; height: 1.5em; }
svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Background */
#checker{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(45deg,var(--check-a) 25%,transparent 25%),linear-gradient(135deg,var(--check-a) 25%,transparent 25%),linear-gradient(45deg,transparent 75%,var(--check-a) 75%),linear-gradient(135deg,transparent 75%,var(--check-a) 75%);background-size:40px 40px;background-position:0 0,20px 0,20px -20px,0 20px;animation:checkScroll 5s linear infinite;opacity:0.5}
body.light #checker{opacity:0.9}
@keyframes checkScroll{from{background-position:0 0,20px 0,20px -20px,0 20px}to{background-position:-40px 40px,-20px 40px,-20px 20px,-40px 60px}}
#glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 55% 45% at 80% 5%,rgba(229, 188, 188,.12) 0%,transparent 70%),radial-gradient(ellipse 40% 50% at 5% 90%,rgba(214,154,168,.07) 0%,transparent 70%);animation:glowPulse 8s ease-in-out infinite alternate}
#glow2{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(124,202,184,.08) 0%,transparent 65%),radial-gradient(ellipse 50% 60% at 90% 40%,rgba(201,168,227,.06) 0%,transparent 60%);animation:glowFloat 25s ease-in-out infinite alternate}
@keyframes glowPulse{from{opacity:.8}to{opacity:1}}
@keyframes glowFloat{from{transform:translate(0,0) scale(1)}to{transform:translate(-30px,-20px) scale(1.1)}}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.6}90%{opacity:.2}100%{transform:translateY(-100vh) scale(.4);opacity:0}}
#grain{position:fixed;inset:0;z-index:999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.035}

/* Loader */
#loader{position:fixed;inset:0;z-index:2000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity 0.5s;}
#loader.hidden{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:4px;padding:.75rem 1.5rem;background:var(--nav-bg);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:background .4s}
.nav-logo{display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:.9rem;letter-spacing:-.01em;color:var(--text);white-space:nowrap;margin-right:.3rem;cursor:pointer}
.logo-badge{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.82rem;box-shadow:0 3px 10px rgba(229, 188, 188,.35);flex-shrink:0;transition:transform .3s;color:#fff;overflow:hidden;border:1px solid var(--amber)}
.logo-badge img{width:100%;height:100%;object-fit:cover}
.nav-logo:hover .logo-badge{transform:rotate(-10deg) scale(1.1)}
.nbtn{font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;padding:.42rem .9rem;border-radius:10px;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted);display:flex;align-items:center;gap:.3rem}
.nbtn:hover{background:rgba(229, 188, 188,.1);color:var(--text)}
.nbtn.outline{border:1px solid var(--border2);color:var(--text)}
.nbtn.outline:hover{border-color:var(--amber);background:rgba(229, 188, 188,.08)}
.nbtn.warm{background:linear-gradient(135deg,var(--amber),var(--rose));color:#1a0f00;font-weight:800;box-shadow:0 3px 14px rgba(229, 188, 188,.35)}
.nbtn.warm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(229, 188, 188,.45)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:4px}
#profileBtn{display:none;align-items:center;gap:.45rem;background:rgba(229, 188, 188,.1);border:1px solid var(--border2);color:var(--text);padding:.35rem .8rem .35rem .4rem;border-radius:100px;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;transition:all .2s}
#profileBtn:hover{background:rgba(229, 188, 188,.2);transform:translateY(-1px)}
.pav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;overflow:hidden;border:2px solid var(--amber);background:var(--bg3);box-shadow:0 0 8px rgba(229, 188, 188,.2)}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
#coinsChip{font-size:.75rem;font-weight:700;color:var(--amber);background:rgba(229, 188, 188,.15);border:1px solid var(--border2);border-radius:100px;padding:.3rem .8rem;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
#onlineChip{font-size:.75rem;font-weight:700;color:var(--teal);background:rgba(124,202,184,.1);border:1px solid rgba(124,202,184,.2);border-radius:100px;padding:.3rem .8rem;display:flex;align-items:center;gap:.35rem;white-space:nowrap}
#onlineDot{width:8px;height:8px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}

@media (max-width: 768px) {
  nav{padding:.6rem 1rem;gap:2px}
  .nav-logo span{display:none} 
  .nbtn{padding:.4rem .6rem;font-size:.7rem}
  #coinsChip, #onlineChip{display:none} 
}

/* Panel */
.panel{position:relative;z-index:1;width:clamp(300px,92vw,640px);margin:6.5rem auto 5rem;padding:2.3rem;background:var(--panel-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:26px;box-shadow:0 24px 70px rgba(0,0,0,.32);text-align:center;transition:background .4s; overflow:hidden;}
.panel.animate{animation:panelIn .55s cubic-bezier(.23,1,.32,1) both}
@keyframes panelIn{from{opacity:0;transform:translateY(30px) scale(0.96)}to{opacity:1;transform:none}}
.panel h1{font-family:'Nunito',sans-serif;font-size:1.85rem;font-weight:800;letter-spacing:-.025em;margin-bottom:.4rem;line-height:1.15}
.panel h1 em{font-family:'Lora',serif;font-style:italic;font-weight:400;background:linear-gradient(100deg,var(--amber),var(--amber2),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.panel>p,.info>p{font-size:.88rem;color:var(--muted);margin-bottom:1rem}
.lbl{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:.5rem;display:block;text-align:left}
.divider{height:1px;margin:1.3rem 0;background:linear-gradient(to right,transparent,var(--border2),transparent)}

/* News & Games */
.news{text-align:left;max-height:170px;overflow-y:auto;background:rgba(229, 188, 188,.03);border:1px solid var(--border);border-radius:14px;padding:.85rem 1.1rem;list-style:none}
.news li{font-size:.82rem;color:var(--muted);padding:.36rem 0;border-bottom:1px solid var(--border)}
.news li:last-child{border-bottom:none}
.news li::before{content:'✦ ';color:var(--amber);font-size:.6rem}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-top:1rem}
.gtile{background:rgba(229, 188, 188,.03);border:1px solid var(--border);border-radius:16px;padding:1.1rem;text-align:left;cursor:pointer;transition:all .3s cubic-bezier(.23,1,.32,1);position:relative;overflow:hidden;animation:tileIn .4s cubic-bezier(.23,1,.32,1) both}
.gtile:nth-child(1){animation-delay:.05s}.gtile:nth-child(2){animation-delay:.1s}.gtile:nth-child(3){animation-delay:.15s}.gtile:nth-child(4){animation-delay:.2s}
@keyframes tileIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.gtile:hover{border-color:var(--border2);transform:translateY(-4px) scale(1.01);box-shadow:0 12px 32px rgba(0,0,0,.25)}
.ticon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;margin-bottom:.6rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1);color:inherit}
.gtile:hover .ticon{transform:scale(1.15) rotate(-5deg)}
.t1{background:rgba(229, 188, 188,.15);color:var(--amber)}.t2{background:rgba(124,202,184,.12);color:var(--teal)}.t3{background:rgba(214,154,168,.12);color:var(--rose)}.t4{background:rgba(201,168,227,.12);color:var(--lilac)}
.tname{font-weight:800;font-size:.88rem;margin-bottom:.18rem;color:var(--text);position:relative;z-index:1}
.ttag{font-size:.64rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;position:relative;z-index:1}
.info{text-align:left}.info h1{margin-bottom:.9rem}

/* Profile with Banner */
.prof-wrap{display:flex;flex-direction:column;align-items:center;gap:.5rem; margin-top:-2.3rem; margin-left:-2.3rem; margin-right:-2.3rem;}
.banner-area{position:relative;width:100%;height:140px;background-color:var(--bg3);overflow:hidden;}
.banner-img{width:100%;height:100%;object-fit:cover;}
.prof-content{padding:0 2.3rem 0 2.3rem; display:flex;flex-direction:column;align-items:center;margin-top:-50px;position:relative;z-index:1;}
.av-ring{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--rose));padding:3px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 28px rgba(229, 188, 188,.35);animation:avPop .6s cubic-bezier(.34,1.56,.64,1) both;border:4px solid var(--bg2)}
@keyframes avPop{from{transform:scale(.5) rotate(-10deg);opacity:0}to{transform:none;opacity:1}}
.av-inner{width:100%;height:100%;border-radius:50%;background:var(--bg2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.av-inner img{width:100%;height:100%;object-fit:cover}
.prof-wrap h2{font-size:1.3rem;font-weight:800;letter-spacing:-.02em; margin-top:.5rem}
.upload-lbl{display:inline-flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.77rem;font-weight:700;color:var(--muted);background:rgba(229, 188, 188,.06);border:1px solid var(--border2);border-radius:10px;padding:.42rem .9rem;transition:all .2s;margin-top:.2rem}
.upload-lbl:hover{background:rgba(229, 188, 188,.12);color:var(--text)}
.upload-lbl input{display:none}
.prof-actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.8rem}

/* Chat */
.chat-layout{display:grid;grid-template-columns:180px 1fr;gap:1rem;margin-top:.8rem;text-align:left}
@media(max-width:600px){.chat-layout{grid-template-columns:1fr}}
.chat-room-btn{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;padding:.5rem .75rem;border-radius:10px;border:none;cursor:pointer;text-align:left;transition:all .2s;background:transparent;color:var(--muted);width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:.4rem}
.chat-room-btn:hover{background:rgba(229, 188, 188,.08);color:var(--text)}
.chat-room-btn.active{background:rgba(229, 188, 188,.15);color:var(--amber);border:1px solid var(--border2)}
.chat-room-section{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.4rem .75rem .2rem;margin-top:.3rem}
.chat-main{display:flex;flex-direction:column;gap:.6rem}
.chat-box{height:240px;overflow-y:auto;background:rgba(229, 188, 188,.02);border:1px solid var(--border);border-radius:14px;padding:.75rem 1rem}
.chat-msg{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem;position:relative;animation: msgSlide .35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;}
.chat-av{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;overflow:hidden;cursor:pointer;transition:transform .2s;border:2px solid var(--amber)}
.chat-av:hover{transform:scale(1.1)}
.chat-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-body{font-size:.82rem;line-height:1.5;flex-grow:1}
.chat-user{font-weight:800;color:var(--amber);font-size:.74rem;margin-bottom:.08rem;cursor:pointer;display:inline-block}
.chat-text{color:var(--text);word-break:break-word}
.chat-input-row{display:flex;gap:.5rem}

/* Search */
.search-bar-wrap{position:relative;margin-bottom:1rem}
.search-bar-wrap .inp{padding-left:2.4rem;font-size:.95rem}
.search-icon{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.5;color:var(--muted)}
.search-tabs{display:flex;gap:.35rem;margin-bottom:1rem}
.stab{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;padding:.35rem .85rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.stab:hover{background:rgba(229, 188, 188,.07);color:var(--text)}
.stab.active{background:rgba(229, 188, 188,.15);border-color:var(--amber);color:var(--amber)}
.search-section-lbl{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:1rem 0 .5rem;display:block;text-align:left}
.game-cards{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.5rem}
.game-card{background:rgba(229, 188, 188,.03);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s cubic-bezier(.23,1,.32,1);text-align:left}
.game-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.25)}
.game-card-thumb{height:72px;display:flex;align-items:center;justify-content:center;font-size:2rem}
.game-card-name{font-weight:800;font-size:.82rem;color:var(--text);margin-bottom:.18rem}
.game-card-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.game-card-tag{font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.15rem .45rem;border-radius:100px}
.game-card-players{font-size:.65rem;color:var(--muted);font-weight:600}
.result-item{display:flex;align-items:center;gap:.7rem;padding:.55rem .8rem;border-radius:12px;background:rgba(229, 188, 188,.03);border:1px solid var(--border);margin-bottom:.45rem;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}
.result-item:hover{border-color:var(--border2);background:rgba(229, 188, 188,.07)}
.fav{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;overflow:hidden;border:2px solid var(--amber)}
.fav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.result-friend-chip{font-size:.6rem;font-weight:700;color:var(--teal);background:rgba(124,202,184,.1);border:1px solid rgba(124,202,184,.2);border-radius:100px;padding:.12rem .4rem;margin-left:.3rem}
.no-results{text-align:center;padding:2rem 0;color:var(--muted);font-size:.85rem}

/* Admin & Block Badges */
.admin-badge{font-size:.6rem;font-weight:700;background:linear-gradient(135deg,var(--rose),#d66a5a);color:#fff;padding:.18rem .45rem;border-radius:6px;margin-left:.4rem;text-transform:uppercase;letter-spacing:.03em;box-shadow:0 2px 6px rgba(214,154,168,.3);vertical-align:middle}
.del-msg-btn{position:absolute;right:0;top:0;font-size:.7rem;cursor:pointer;opacity:0;transition:opacity .2s;color:var(--muted);background:none;border:none;line-height:1}
.chat-msg:hover .del-msg-btn{opacity:1}
.del-msg-btn:hover{color:var(--rose)}
.admin-actions{margin-top:.8rem;display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center}

/* Buttons */
.pbtn{font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;padding:.56rem 1.3rem;border-radius:12px;border:none;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.4rem}
.pbtn.warm{background:linear-gradient(135deg,var(--amber),var(--rose));color:#1a0f00;box-shadow:0 3px 14px rgba(229, 188, 188,.3)}
.pbtn.warm:hover{transform:translateY(-1px);box-shadow:0 7px 22px rgba(229, 188, 188,.4)}
.pbtn.out{background:transparent;color:var(--text);border:1px solid var(--border2)}
.pbtn.out:hover{border-color:var(--amber);background:rgba(229, 188, 188,.08)}
.pbtn.danger{background:rgba(214,154,168,.1);color:var(--rose);border:1px solid rgba(214,154,168,.2)}
.pbtn.danger:hover{background:rgba(214,154,168,.18);transform:translateY(-1px)}
.pbtn.sm{padding:.3rem .6rem;font-size:.7rem;margin-top:0}
.ban-btn{font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:700;padding:.45rem 1rem;border-radius:10px;border:1px solid rgba(214,154,168,.3);cursor:pointer;transition:all .22s;background:rgba(214,154,168,.08);color:var(--rose)}
.ban-btn:hover{background:rgba(214,154,168,.18);transform:translateY(-1px)}

/* Inputs */
.inp{width:100%;padding:.66rem .9rem;margin:.28rem 0;background:rgba(229, 188, 188,.04);border:1px solid var(--border2);border-radius:11px;font-family:'Nunito',sans-serif;font-size:.87rem;color:var(--text);outline:none;transition:border-color .2s, box-shadow .2s}
.inp::placeholder{color:rgba(160,138,148,.45)}
.inp:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(229, 188, 188,0.15)}

/* Modal */
.modal{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(10,7,4,.72);backdrop-filter:blur(18px);z-index:1000}
.modal.open{display:flex}
.mwin{width:350px;background:var(--bg2);border:1px solid var(--border2);padding:2rem;border-radius:24px;box-shadow:0 40px 80px rgba(0,0,0,.5);transform:scale(.9) translateY(16px);opacity:0;transition:.3s cubic-bezier(.34,1.56,.64,1)}
.modal.open .mwin{transform:none;opacity:1}
.mbadge{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:.85rem;background:rgba(229, 188, 188,.15);color:var(--amber)}

.msub{font-size:.8rem;color:var(--muted);margin-bottom:1.2rem}
.mwin .inp{margin:.3rem 0}
.mwin .pbtn{width:100%;margin-top:.5rem;font-size:.87rem;padding:.7rem;border-radius:12px}
.mswitch{text-align:center;margin-top:.9rem;font-size:.77rem;color:var(--muted)}
.mswitch a{color:var(--amber);cursor:pointer;font-weight:700}

/* Toast */
#toast{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);border:1px solid var(--border2);border-radius:100px;padding:.65rem 1.4rem;font-size:.8rem;font-weight:700;color:var(--text);z-index:2000;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Footer */
footer{position:fixed;bottom:0;left:0;right:0;z-index:400;padding:.7rem 1.5rem;background:var(--nav-bg);backdrop-filter:blur(24px);border-top:1px solid var(--border);text-align:center;font-size:.7rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;transition:background .4s}
footer a{color:var(--amber);text-decoration:none;font-weight:700;margin:0 .5rem;transition:color .2s}
footer a:hover{color:var(--text)}
@media(max-width:600px){footer{flex-direction:column;gap:.3rem;padding:.5rem}}

};
document.getElementById('searchIcon').innerHTML = ICONS.search;
document.getElementById('themeIcon').innerHTML = ICONS.moon;

/* ── FIREBASE ── */
firebase.initializeApp({
  apiKey: "AIzaSyAqEqV8SunMJe5gC4vo-71sB54UFig2fWw",
  authDomain: "mini-games-calm-relax-70452.firebaseapp.com",
  databaseURL: "https://mini-games-calm-relax-70452-default-rtdb.firebaseio.com",

});
const auth = firebase.auth();
const db   = firebase.database();
const ADMINS = ["dMbziKPNbmPMVKhxku0FlaKfZuH2"];

const safeStorage = {
  getItem: (k) => { try { return localStorage.getItem(k); } catch (e) { return null; } },
  setItem: (k, v) => { try { localStorage.setItem(k, v); } catch (e) { console.warn("Storage blocked"); } },
  removeItem: (k) => { try { localStorage.removeItem(k); } catch (e) {} }
};

var me=null, chatRef=null, chatCb=null, isLight=false, activeDM=null, currentPath="home", isBanned=false;

function initPresence() {
  const ref=db.ref("presence"); let sid=safeStorage.getItem('sid')||Math.random().toString(36).substr(2,9); safeStorage.setItem('sid',sid);
  db.ref(".info/connected").on("value",s=>{if(s.val()===true){ref.child(sid).set(true);ref.child(sid).onDisconnect().remove()}});
  ref.on("value",s=>document.getElementById('onlineCount').textContent=s.numChildren());
}
initPresence();

function toast(m,ms=2600){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms)}
function toggleTheme(){isLight=!isLight;document.body.classList.toggle('light',isLight); document.getElementById('themeIcon').innerHTML=isLight?ICONS.sun:ICONS.moon}
function setPanel(h){unsubscribeChat();const el=document.getElementById('panel');el.classList.remove("animate");el.innerHTML=h;requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("animate")));}
function unsubscribeChat(){if(chatRef&&chatCb){chatRef.off("value",chatCb);chatRef=null;chatCb=null}}

/* ── ROUTING ── */
function navigate(p,a){let h=p; if(a) h+="/"+a; location.hash = h; }
function handleRoute(){
  const h=location.hash.slice(1)||"home";
  const[p,a]=h.split("/");
  currentPath=p;
  if(!me&&p==='chat'){toast("⚠️ Log in first.");navigate('home');return}
  switch(p){
    case'about':renderAbout();break;
    case'support':renderSupport();break;
    case'games':renderGames();break;
    case'sprunki':renderSprunki();break;
    case'search':renderSearch();break;
    case'chat':activeDM=a||null;renderChat();break;
    case'profile':a?renderUserProfile(a):renderProfile();break;
    case'terms':renderTerms();break;
    case'privacy':renderPrivacy();break;
    default: renderHome();break;
  }
}
window.addEventListener('hashchange',handleRoute);window.addEventListener('popstate',handleRoute);

/* ── AUTH ── */
firebase.auth().onAuthStateChanged(async user => {
  if(isBanned)return;
  if(user){
    const b=await db.ref("banned/"+user.uid).once("value");if(b.exists()){isBanned=true;toast("⚠️ Banned");await auth.signOut();return}
    const snap=await db.ref("users/"+user.uid).get();
    if(snap.exists()){const d=snap.val();me={uid:user.uid,username:d.username||"User",coins:d.coins||0,avatar:d.avatar||"",banner:d.banner||"",friends:d.friends||{},blocked:d.blocked||{},sentRequests:d.sentRequests||{}};}
    else{me={uid:user.uid,username:user.email.split('@')[0],coins:0,avatar:"",banner:"",friends:{},blocked:{},sentRequests:{}};await db.ref("users/"+user.uid).set(me)}
    onLoggedIn();
  }else{isBanned=false;me=null;onLoggedOut()}
  handleRoute();
  setTimeout(()=>document.getElementById('loader').classList.add('hidden'),500);
});

function onLoggedIn(){
  document.getElementById('loginBtn').style.display='none';document.getElementById('signupBtn').style.display='none';
  document.getElementById('profileBtn').style.display='flex';document.getElementById('chatNavBtn').style.display='inline-block';
  document.getElementById('coinCount').textContent=me.coins||0;document.getElementById('pavName').textContent=me.username;
  const p=document.getElementById('pav');me.avatar?p.innerHTML=`<img src="${me.avatar}">`:p.innerHTML=`<span class="icon icon-xl">${ICONS.user}</span>`;
  db.ref("friendRequests/"+me.uid).on("value",s=>{const c=s.exists()?s.numChildren():0;const b=document.getElementById('profileBtn');const o=document.getElementById('reqBadge');if(o)o.remove();if(c>0){const d=document.createElement("span");d.id='reqBadge';d.textContent=c;d.style.cssText="background:var(--rose);color:#fff;font-size:.6rem;font-weight:800;padding:.1rem .38rem;border-radius:100px";b.appendChild(d)}});
}
function onLoggedOut(){document.getElementById('loginBtn').style.display='inline-block';document.getElementById('signupBtn').style.display='inline-block';document.getElementById('profileBtn').style.display='none';document.getElementById('chatNavBtn').style.display='none';document.getElementById('coinCount').textContent=0;if(me)db.ref("friendRequests/"+me.uid).off();const o=document.getElementById('reqBadge');if(o)o.remove()}

function openModal(h){document.getElementById('mwin').innerHTML=h;document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});

function openSignup(){openModal(`<div class="mbadge" style="background:rgba(124,202,184,.1)"><span class="icon icon-xl">${ICONS.userPlus}</span></div><h2>Join the fun</h2><p class="msub">Create your free account</p><input class="inp" id="suEmail" type="email" placeholder="Email"><input class="inp" id="suUsername" placeholder="Username"><input class="inp" id="suPass" type="password" placeholder="Password"><button class="pbtn warm" onclick="doSignup()"><span class="icon">${ICONS.plus}</span> Create account</button><p class="mswitch">Already registered? <a onclick="openLogin()">Log in</a></p>`)}
async function doSignup(){const e=document.getElementById('suEmail').value.trim(),u=document.getElementById('suUsername').value.trim(),p=document.getElementById('suPass').value;if(!e||!u||!p){toast("⚠️ Fill in all fields.");return}if(p.length<6){toast("⚠️ 6+ chars");return}try{const c=await auth.createUserWithEmailAndPassword(e,p);await db.ref("users/"+c.user.uid).set({username:u,coins:0,avatar:"",banner:"",friends:{},blocked:{}});closeModal();toast("🎉 Welcome, "+u+"!");}catch(e){toast("⚠️ "+e.message)}}

function openLogin(){openModal(`<div class="mbadge"><span class="icon icon-xl">${ICONS.user}</span></div><h2>Welcome back</h2><p class="msub">Log in to your account</p><input class="inp" id="liEmail" type="email" placeholder="Email"><input class="inp" id="liPass" type="password" placeholder="Password"><button class="pbtn warm" onclick="doLogin()">Log in</button><p class="mswitch"><a onclick="resetPassword()">Forgot Password?</a></p><p class="mswitch">No account? <a onclick="openSignup()">Sign up free</a></p>`)}
async function doLogin(){const e=document.getElementById('liEmail').value.trim(),p=document.getElementById('liPass').value;try{await auth.signInWithEmailAndPassword(e,p);closeModal()}catch(_){toast("⚠️ Incorrect credentials")}}
async function resetPassword(){const e=document.getElementById('liEmail').value.trim();if(!e){toast("⚠️ Enter email");return}try{await auth.sendPasswordResetEmail(e);toast("✅ Email sent!");closeModal()}catch(e){toast("⚠️ "+e.message)}}

/* ── PAGES ── */
function renderHome(){setPanel(`<h1>Welcome to <em>Mini Games Calm Relax!</em></h1><p>A cozy little corner of the internet.</p><div class="divider"></div><span class="lbl">Latest news</span><ul class="news"><li>No recent news — check back soon!</li></ul>`)}
function renderAbout(){setPanel(`<div class="info"><h1>About 🍵</h1><div class="divider"></div><p>Mini Games Calm Relax is a cozy site for people who want to play something fun without stress.</p></div>`)}
function renderSupport(){setPanel(`<div class="info"><h1>Support 💛</h1><div class="divider"></div><p>Having issues or want to say hi? Join our Discord community!</p><button class="pbtn warm" onclick="window.open('https://discord.gg/ekgbMfPeN4','_blank')">Join Discord</button></div>`)}

  setPanel(`<h1>Games 🎮</h1><p>Pick what you're feeling today.</p><div class="games-grid">
    <div class="gtile" onclick="navigate('sprunki')"><div class="ticon t1"><span class="icon icon-xl">${ICONS.music}</span></div><div class="tname">Sprunki</div><div class="ttag">Music</div></div>
    <div class="gtile" onclick="toast('Platform Chicken coming soon! 🐔')"><div class="ticon t2"><span class="icon icon-xl">${ICONS.bird}</span></div><div class="tname">Platform Chicken</div><div class="ttag">Platformer</div></div>
    <div class="gtile" onclick="toast('2048 coming soon! 🔢')"><div class="ticon t3"><span class="icon icon-xl">${ICONS.grid}</span></div><div class="tname">2048</div><div class="ttag">Puzzle</div></div>
    <div class="gtile" onclick="window.open('https://freebaldi.github.io/','_blank')"><div class="ticon t4"><span class="icon icon-xl">${ICONS.book}</span></div><div class="tname">Baldi's Basics</div><div class="ttag">Adventure</div></div>
  </div>`);
}

/* ── SEARCH ── */
const GAMES_DB = [
  { name: "Sprunki", tag: "Music", icon: ICONS.music, color:"rgba(229, 188, 188,.15)", tagColor:"var(--amber)", players:"124", badge:"", action: `navigate('sprunki')` },
  { name: "Platform Chicken", tag: "Platformer", icon: ICONS.bird, color:"rgba(124,202,184,.15)", tagColor:"var(--teal)", players:"87", badge:"", action: `toast('Soon')` },
  { name: "2048", tag: "Puzzle", icon: ICONS.grid, color:"rgba(214,154,168,.15)", tagColor:"var(--rose)", players:"213", badge:"Popular", action: `toast('Soon')` },
  { name: "Baldi's Basics", tag: "Adventure", icon: ICONS.book, color:"rgba(201,168,227,.15)", tagColor:"var(--lilac)", players:"56", badge:"Play Now", action: `window.open('https://freebaldi.nekoweb.org/','_blank')` }
];
var searchTab = "all";
function renderSearch(){setPanel(`<h1>Discover 🔍</h1><p>Find games, players, and more.</p><div class="search-bar-wrap"><span class="search-icon"><span class="icon">${ICONS.search}</span></span><input class="inp" id="searchInput" placeholder="Search games or people…" oninput="doSearch()" autocomplete="off"></div><div class="search-tabs"><button class="stab active" id="tab-all" onclick="setSearchTab('all')">All</button><button class="stab" id="tab-games" onclick="setSearchTab('games')">🎮 Games</button><button class="stab" id="tab-people" onclick="setSearchTab('people')">👤 People</button></div><div id="searchResults" class="search-results"></div>`);renderSearchDefault()}
function setSearchTab(tab){searchTab=tab;["all","games","people"].forEach(t=>document.getElementById("tab-"+t).classList.toggle("active",t===tab));doSearch()}
function renderSearchDefault(){const r=document.getElementById("searchResults");if(!r)return;let h="";if(searchTab!=="people"){h+=`<span class="search-section-lbl">🔥 Popular Games</span>`;h+=buildGameCards(GAMES_DB)}if(searchTab!=="games"){h+=`<span class="search-section-lbl">✦ Add Friend by UID</span><div style="display:flex;gap:.5rem;align-items:center"><input class="inp" id="fuid" placeholder="Paste a friend's UID…" style="margin:0"><button class="pbtn warm" style="margin:0;white-space:nowrap" onclick="addFriend()">Add</button></div>`}r.innerHTML=h}
function buildGameCards(list){if(!list.length)return"";let h=`<div class="game-cards">`;list.forEach(g=>{h+=`<div class="game-card" onclick="${g.action}"><div class="game-card-thumb" style="background:${g.color};color:${g.tagColor}"><span class="icon icon-xl">${g.icon}</span></div><div class="game-card-body"><div class="game-card-name">${g.name}</div><div class="game-card-meta"><span class="game-card-tag" style="background:${g.color};color:${g.tagColor}">${g.tag}</span><span class="game-card-players">👥 ${g.players}</span>${g.badge?`<span class="game-card-badge">${g.badge}</span>`:""}</div></div></div>`});h+=`</div>`;return h}
function buildPeopleResults(users){if(!users.length)return"";let h="";users.forEach(d=>{const uid=d.uid;const avHTML=d.avatar?`<img src="${d.avatar}" alt="">`:`<span class="icon icon-lg">${ICONS.user}</span>`;const isFriend=me&&me.friends&&me.friends[uid];const isBlocked=me&&me.blocked&&me.blocked[uid];const iSentRequest=me&&me.sentRequests&&me.sentRequests[uid];const friendChip=isFriend?`<span class="result-friend-chip">Friend</span>`:"";let actionsHtml="";if(me){if(uid!==me.uid){if(isBlocked){actionsHtml=`<button class="pbtn danger sm" onclick="event.stopPropagation();unblockUser('${uid}')">Unblock</button>`}else if(isFriend){actionsHtml=`<button class="pbtn out sm" onclick="event.stopPropagation();navigate('chat','${uid}')"><span class="icon">${ICONS.message}</span></button>`}else if(iSentRequest){actionsHtml=`<button class="pbtn out sm" style="opacity:.65">Pending</button>`}else{actionsHtml=`<button class="pbtn out sm" onclick="event.stopPropagation();sendFriendRequest('${uid}')">Add</button>`}}}else{actionsHtml=`<button class="pbtn out sm" onclick="openLogin()">Log in</button>`}h+=`<div class="result-item" onclick="navigate('profile','${uid}')"><div class="fav">${avHTML}</div><div style="flex-grow:1"><div style="font-weight:700">${d.username||"?"}${friendChip}</div><div style="font-size:.64rem;color:var(--muted)">${uid}</div></div>${actionsHtml}</div>`});return h}
async function doSearch(){const q=(document.getElementById("searchInput")?.value||"").trim().toLowerCase();const r=document.getElementById("searchResults");if(!r)return;if(!q){renderSearchDefault();return}let h="";if(searchTab!=="people"){const f=GAMES_DB.filter(g=>g.name.toLowerCase().includes(q)||g.tag.toLowerCase().includes(q));if(f.length){h+=`<span class="search-section-lbl">🎮 Games</span>`;h+=buildGameCards(f)}}if(searchTab!=="games"){r.innerHTML=h+`<span class="search-section-lbl">👤 People</span><div id="peopleSlot"><span style="color:var(--muted)">Searching…</span></div>`;try{let f=[];const us=await db.ref("users/"+q).once("value");if(us.exists())f.push({uid:q,...us.val()});const qs=[q,q[0].toUpperCase()+q.slice(1)];for(const k of qs){const ns=await db.ref("users").orderByChild("username").startAt(k).endAt(k+"\uf8ff").limitToFirst(6).once("value");ns.forEach(u=>{if(!f.find(x=>x.uid===u.key))f.push({uid:u.key,...u.val()})})}document.getElementById('peopleSlot').innerHTML=f.length?buildPeopleResults(f):`<div class="no-results">No results</div>`}catch(e){console.error(e)}}else r.innerHTML=h}

/* ── FRIEND REQUESTS ── */
async function addFriend(){const id=document.getElementById('fuid')?.value.trim();if(!id){toast("Paste UID");return}if(!me){toast("Log in");return}if(id===me.uid){toast("That's you");return}await sendFriendRequest(id)}
async function sendFriendRequest(fid){if(!me)return;if(me.friends&&me.friends[fid]){toast("Already friends");return}if(me.sentRequests&&me.sentRequests[fid]){toast("Already sent");return}try{const tr=await db.ref("friendRequests/"+me.uid+"/"+fid).once("value");if(tr.exists()){await acceptFriendRequest(fid,true);return}const s=await db.ref("users/"+fid).get();if(!s.exists()){toast("User not found");return}await db.ref("friendRequests/"+fid+"/"+me.uid).set({from:me.uid,username:me.username,avatar:me.avatar||"",ts:Date.now()});await db.ref("users/"+me.uid+"/sentRequests/"+fid).set(true);if(!me.sentRequests)me.sentRequests={};me.sentRequests[fid]=true;toast("📨 Request sent!")}catch(e){toast("⚠️ "+e.message)}}
async function acceptFriendRequest(id,s){if(!me)return;try{await db.ref("users/"+me.uid+"/friends/"+id).set(true);await db.ref("users/"+id+"/friends/"+me.uid).set(true);await db.ref("friendRequests/"+me.uid+"/"+id).remove();await db.ref("users/"+id+"/sentRequests/"+me.uid).remove();if(!me.friends)me.friends={};me.friends[id]=true;toast(s?"✅ Mutual!":"✅ Friends!");renderProfile()}catch(e){toast("⚠️ "+e.message)}}
async function declineFriendRequest(id){if(!me)return;try{await db.ref("friendRequests/"+me.uid+"/"+id).remove();await db.ref("users/"+id+"/sentRequests/"+me.uid).remove();toast("Declined");renderProfile()}catch(e){toast("⚠️ "+e.message)}}
async function cancelFriendRequest(id){if(!me)return;try{await db.ref("friendRequests/"+id+"/"+me.uid).remove();await db.ref("users/"+me.uid+"/sentRequests/"+id).remove();if(me.sentRequests)delete me.sentRequests[id];toast("Cancelled");renderUserProfile(id)}catch(e){toast("⚠️ "+e.message)}}
async function removeFriend(id){if(!me||!confirm("Remove friend?"))return;try{await db.ref("users/"+me.uid+"/friends/"+id).remove();await db.ref("users/"+id+"/friends/"+me.uid).remove();if(me.friends)delete me.friends[id];toast("Removed");renderUserProfile(id)}catch(e){toast("⚠️ "+e.message)}}
async function blockUser(id){if(!me)return;try{await db.ref("users/"+me.uid+"/blocked/"+id).set(true);if(!me.blocked)me.blocked={};me.blocked[id]=true;toast("Blocked");renderUserProfile(id)}catch(e){toast("⚠️ "+e.message)}}
async function unblockUser(id){if(!me)return;try{await db.ref("users/"+me.uid+"/blocked/"+id).remove();if(me.blocked)delete me.blocked[id];toast("Unblocked");renderUserProfile(id)}catch(e){toast("⚠️ "+e.message)}}

/* ── PROFILE (UPDATED FOR BANNERS) ── */
async function renderProfile(){if(!me)return;
  const a=me.avatar?`<img src="${me.avatar}">`:`<span class="icon icon-xl">${ICONS.user}</span>`;
  const bannerHtml = me.banner ? `<img src="${me.banner}" class="banner-img">` : '';
  const ia=ADMINS.includes(me.uid);const adminBadge=ia?`<span class="admin-badge">⭐ Admin</span>`:'';
  const fc=me.friends?Object.keys(me.friends).length:0;
  let rh="";
  try{const rs=await db.ref("friendRequests/"+me.uid).once("value");if(rs.exists()){const rq=[];rs.forEach(r=>rq.push({uid:r.key,...r.val()}));if(rq.length){rh=`<div class="divider"></div><span class="lbl">📨 Requests (${rq.length})</span><div style="display:flex;flex-direction:column;gap:.4rem">`;rq.forEach(r=>{const av=r.avatar?`<img src="${r.avatar}">`:`<span class="icon">${ICONS.user}</span>`;rh+=`<div style="display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;background:rgba(229, 188, 188,.04);border:1px solid var(--border2);border-radius:12px"><div class="fav" onclick="navigate('profile','${r.uid}')">${av}</div><div style="flex-grow:1;font-weight:700">${r.username||"?"}</div><button class="pbtn sm warm" onclick="acceptFriendRequest('${r.uid}',false)">Accept</button><button class="pbtn sm out" onclick="declineFriendRequest('${r.uid}')">Decline</button></div>`});rh+='</div>'}}}catch(_){}
  setPanel(`
    <div class="prof-wrap">
       <div class="banner-area">${bannerHtml}</div>
       <div class="prof-content">
          <div class="av-ring"><div class="av-inner">${a}</div></div>
          <h2>${me.username}</h2>${adminBadge}
          <p style="color:var(--muted)">🪙 ${me.coins||0} coins · 👥 ${fc} friends</p>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">
             <label class="upload-lbl">📷 Avatar<input type="file" accept="image/*" onchange="uploadAvatar(event)"></label>
             <label class="upload-lbl">🖼️ Banner<input type="file" accept="image/*" onchange="uploadBanner(event)"></label>
          </div>
          <p style="font-size:.7rem;color:var(--muted)">UID: <strong style="color:var(--amber);user-select:all">${me.uid}</strong></p>
          ${rh}
          <div class="divider"></div>
          <button class="pbtn out" onclick="doLogout()">Log out</button>
          <button class="pbtn danger" style="margin-left:.4rem" onclick="deleteAccount()">Delete Account</button>
       </div>
    </div>`);
}

async function renderUserProfile(id){try{const s=await db.ref("users/"+id).get();if(!s.exists()){toast("Not found");navigate('home');return}const u=s.val();
  const a=u.avatar?`<img src="${u.avatar}">`:`<span class="icon icon-xl">${ICONS.user}</span>`;
  const bannerHtml = u.banner ? `<img src="${u.banner}" class="banner-img">` : '';
  const ia=ADMINS.includes(id);let act="";let aa="";
  if(me){const f=me.friends&&me.friends[id];const bl=me.blocked&&me.blocked[id];const sr=me.sentRequests&&me.sentRequests[id];const iam=ADMINS.includes(me.uid);let tr=false;try{const r=await db.ref("friendRequests/"+me.uid+"/"+id).once("value");tr=r.exists()}catch(_){}if(id!==me.uid){if(bl){act=`<button class="pbtn danger" onclick="unblockUser('${id}')">Unblock</button>`}else if(f){act=`<button class="pbtn out" onclick="navigate('chat','${id}')"><span class="icon">${ICONS.message}</span> Message</button><button class="pbtn danger" style="margin-left:.5rem" onclick="removeFriend('${id}')">Remove</button><button class="pbtn danger" style="margin-left:.5rem" onclick="blockUser('${id}')">Block</button>`}else if(tr){act=`<button class="pbtn warm" onclick="acceptFriendRequest('${id}',false)">Accept</button><button class="pbtn out" style="margin-left:.5rem" onclick="declineFriendRequest('${id}')">Decline</button>`}else if(sr){act=`<button class="pbtn out" style="opacity:.7">Pending</button><button class="pbtn danger" style="margin-left:.5rem" onclick="cancelFriendRequest('${id}')">Cancel</button>`}else{act=`<button class="pbtn warm" onclick="sendFriendRequest('${id}')">Add Friend</button><button class="pbtn danger" style="margin-left:.5rem" onclick="blockUser('${id}')">Block</button>`}}if(iam&&id!==me.uid){aa=`<div class="admin-actions"><button class="ban-btn" onclick="banUser('${id}')"><span class="icon">${ICONS.ban}</span> Ban</button><button class="ban-btn" style="background:rgba(200,50,50,.1);color:#c44" onclick="deleteUserData('${id}')">🗑️ Delete</button></div>`}}else{act=`<button class="pbtn warm" onclick="openLogin()">Log in</button>`}
  setPanel(`
    <div class="prof-wrap">
       <div class="banner-area">${bannerHtml}</div>
       <div class="prof-content">
          <div class="av-ring"><div class="av-inner">${a}</div></div>
          <h2>${u.username||"?"}</h2>
          ${ia?`<span class="admin-badge">⭐ Admin</span>`:''}
          <p style="color:var(--muted)">🪙 ${u.coins||0} coins</p>
          <div style="margin-top:.8rem">${act}</div>${aa}
       </div>
    </div>`);
  }catch(_){toast("Error")}}
  
async function uploadBanner(e){const f=e.target.files[0];if(!f||!me)return;toast("Processing...");try{const ri=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');const mx=900;let w=i.width,h=i.height;if(w>h){if(w>mx){h*=mx/w;w=mx}}else{if(h>mx){w*=mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res(c.toDataURL('image/jpeg',.7))};i.src=ev.target.result};r.onerror=rej;r.readAsDataURL(f)});await db.ref("users/"+me.uid+"/banner").set(ri);me.banner=ri;toast("✅ Banner Updated!");renderProfile()}catch(_){toast("⚠️ Failed")}}

async function banUser(id){if(!ADMINS.includes(me.uid))return;if(!confirm("Ban user?"))return;try{await db.ref("banned/"+id).set(true);toast("Banned");navigate('home')}catch(e){toast("⚠️ "+e.message)}}
async function deleteUserData(id){if(!ADMINS.includes(me.uid))return;if(!confirm("Delete data?"))return;try{await db.ref("users/"+id).remove();await db.ref("banned/"+id).remove();toast("Deleted");navigate('home')}catch(e){toast("⚠️ Error")}}
async function uploadAvatar(e){const f=e.target.files[0];if(!f||!me)return;toast("Processing...");try{const ri=await new Promise((res,rej)=>{const r=new FileReader();r.onload=ev=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');const mx=128;let w=i.width,h=i.height;if(w>h){if(w>mx){h*=mx/w;w=mx}}else{if(h>mx){w*=mx/h;h=mx}}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res(c.toDataURL('image/jpeg',.7))};i.src=ev.target.result};r.onerror=rej;r.readAsDataURL(f)});await db.ref("users/"+me.uid+"/avatar").set(ri);me.avatar=ri;document.getElementById('pav').innerHTML=`<img src="${ri}">`;toast("✅ Updated!");renderProfile()}catch(_){toast("⚠️ Failed")}}
async function deleteAccount(){if(!confirm("Delete account?"))return;try{await db.ref("users/"+me.uid).remove();await auth.currentUser.delete();toast("Deleted");navigate('home')}catch(e){toast("⚠️ "+e.message)}}
async function doLogout(){try{await auth.signOut();toast("Logged out")}catch(e){toast("⚠️ "+e.message)}}

/* ── CHAT ── */
async function renderChat(){if(!me)return;const fids=Object.keys(me.friends||{}).filter(k=>me.friends[k]);let btns="";for(const id of fids){const ac=activeDM===id?"active":"";let lb=id.slice(0,8)+"…";try{const s=await db.ref("users/"+id+"/username").once("value");if(s.exists())lb=s.val()}catch(_){}btns+=`<button class="chat-room-btn ${ac}" onclick="navigate('chat','${id}')">@ ${lb}</button>`}const ga=activeDM===null?"active":"";setPanel(`<h1 style="margin-bottom:.8rem">Chat 💬</h1><div class="chat-layout"><div class="chat-sidebar"><div class="chat-room-section">Channels</div><button class="chat-room-btn ${ga}" onclick="navigate('chat')"><span class="icon">${ICONS.globe}</span> Global</button>${fids.length?`<div class="chat-room-section">Friends</div>${btns}`:""}</div><div class="chat-main"><div class="chat-box" id="chatBox">Loading…</div><div class="chat-input-row"><input class="inp" id="cm" placeholder="Say something nice…" onkeydown="if(event.key==='Enter')sendMsg()" style="margin:0"><button class="pbtn warm" style="margin:0;padding:0 1rem" onclick="sendMsg()"><span class="icon">${ICONS.send}</span></button></div></div></div>`);sub()}
function sub(){if(chatRef){chatRef.off("value",chatCb);chatRef=null}if(!me)return;const p=activeDM?"dm/"+[me.uid,activeDM].sort().join("_"):"chat/global";chatRef=db.ref(p).limitToLast(40);chatCb=chatRef.on("value",s=>{const b=document.getElementById('chatBox');if(!b)return;if(!s||!s.exists()){b.innerHTML=`<p style="color:var(--muted)">No messages yet</p>`;return}let h="";s.forEach(m=>{const d=m.val(),k=m.key;if(me.blocked&&me.blocked[d.uid])return;const a=d.avatar?`<img src="${d.avatar}">`:`<span class="icon">${ICONS.user}</span>`;const ia=ADMINS.includes(d.uid);const adminBadge=ia?`<span class="admin-badge">⭐</span>`:'';const iam=ADMINS.includes(me.uid);const db=iam?`<button class="del-msg-btn" onclick="deleteMsg('${p}','${k}')">🗑️</button>`:"";h+=`<div class="chat-msg"><div class="chat-av" onclick="navigate('profile','${d.uid}')">${a}</div><div class="chat-body"><div class="chat-user" onclick="navigate('profile','${d.uid}')">${d.user||"?"} ${adminBadge}</div><div class="chat-text">${d.text.replace(/</g,"&lt;")}</div></div>${db}</div>`});b.innerHTML=h;b.scrollTop=b.scrollHeight})}
async function deleteMsg(p,k){if(!ADMINS.includes(me.uid))return;try{await db.ref(p+"/"+k).remove();toast("Deleted")}catch(_){toast("⚠️ Failed")}}
async function sendMsg(){const i=document.getElementById('cm'),t=(i.value||"").trim();if(!t||!me)return;i.value="";const p=activeDM?"dm/"+[me.uid,activeDM].sort().join("_"):"chat/global";try{await db.ref(p).push({user:me.username,uid:me.uid,text:t,avatar:me.avatar||"",ts:Date.now()})}catch(e){toast("⚠️ "+e.message)}}

/* Particles */
(function(){const c=document.getElementById('particles'),cols=["rgba(229, 188, 188,", "rgba(214,154,168,", "rgba(124,202,184,", "rgba(201,168,227,"];for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';const sz=3+Math.random()*5;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;bottom:-20px;background:${cols[i%4]}.55);animation-duration:${12+Math.random()*16}s;animation-delay:${Math.random()*18}s`;c.appendChild(p)}})();
</script>
</body>
